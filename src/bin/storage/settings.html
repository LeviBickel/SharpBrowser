<!DOCTYPE html>
<html dir="ltr" lang="en" i18n-processed="">
<head>
  <meta charset="utf-8">
  <title>Settings</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="other.css">
  <script type="text/javascript" src="jquery-1.10.2.min.js"></script>
  <style>
	  #settings-display{
		padding-left: 50px;
	  }
  </style>
</head>
<body>
  <header>
    <h1 >Settings</h1>
    <input id="term" type="search" tabindex="1" autofocus="" incremental="" placeholder="Search settings" hidden>
  </header>
  <div class="main">
    <div class="summary" id="settings-summary">
      <span id="settings-summary-text"></span>
      <span id="settings-actions">
        <a is="action-link" id="open-settings-folder"  tabindex="0" role="link" hidden>Save settings</a>
      </span>
    </div>
    <div id="settings-display"><br><br>
		<div id="template" class="setting">
        <label for="Homepage">Homepage:</label>
  		<input type="text" id="Homepage" name="Homepage" placeholder="https://www.google.com"><br><br>
		<input id="SaveSettingsButton" type="button" value="Save"/><br><br>
	</div>
  </div>
    <script type="text/javascript">
(async function() {
	//await CefSharp.BindObjectAsync("host");

	document.getElementById("SaveSettingsButton").onclick = SaveSettings;

	$(document).ready(function() {
		LoadSettings();
	});
	
	function LoadSettings(){
    let json = JSON.parse($.getJSON("usersettings.json"));
    alert(json.Homepage);
	}

	function SaveSettings(){
		alert("Saved");
	}
})();
  </script>
</body>
</html>
